<!doctype html><html lang="nl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Barcode scannen</title><link rel="stylesheet" href="/static/style.css"></head>
<body><header><div class="brand"><img src="/static/janbos_logo.png" alt="Jan Bos"><div><h1>Barcode scannen</h1><p>Scan en boek direct</p></div></div><a class="back" href="/">← Overzicht</a></header>
<main class="scan-main"><section class="scanner-card"><div id="scannerBox" class="scanner-box"><video id="scannerVideo" playsinline></video><div class="scan-line"></div></div><div id="scannerMessage" class="scanner-message">Druk op camera starten</div><button id="startScanner" class="primary giant">📷 Camera starten</button><button id="stopScanner" class="other" hidden>Camera stoppen</button><div class="manual-barcode"><span>Of vul de barcode in:</span><form id="manualLookup"><input id="manualBarcode" inputmode="numeric" autocomplete="off" placeholder="Barcode"><button>Openen</button></form></div></section></main>
<script>window.SCANNER_MODE='daily';</script><script src="/static/scanner.js"></script></body></html>
