<main class="scan-main"><section class="scanner-card"><div class="page-kicker">DAGELIJKS GEBRUIK</div><h2>Houd de barcode in beeld</h2><p class="lead">Na het af- of inboeken kom je automatisch terug voor het volgende product.</p><div id="scannerBox" class="scanner-box pro-scanner"><div id="html5Reader" class="html5-reader"></div><div class="scan-shade"></div><div class="scan-corners"></div><div class="scan-line"></div><div id="scanSuccess" class="scan-success"><span>✓</span><strong>Gescand</strong></div></div><div id="scannerMessage" class="scanner-message">Druk op camera starten</div><button id="startScanner" class="primary giant">📷 Camera starten</button><div class="scanner-controls"><button id="torchScanner" class="other torch-button" hidden>💡 Zaklamp aan</button><button id="stopScanner" class="other" hidden>Camera stoppen</button></div><label class="photo-scan-button">📸 Scan via foto<input id="barcodePhoto" type="file" accept="image/*" capture="environment"></label><div class="manual-barcode"><span>Barcode handmatig invullen</span><form id="manualLookup"><input id="manualBarcode" inputmode="numeric" autocomplete="off" placeholder="Barcode"><button>Openen</button></form></div></section></main>
